name: BobApp CI

on:
  push: 
    branches: [ main ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Run backend tests with coverage
        working-directory: back
        run: mvn clean verify

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: back/target/site/jacoco/

  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        working-directory: front
        run: npm install

      - name: Run frontend tests with coverage
        working-directory: front
        run: npm test -- --watch=false --browsers=ChromeHeadless --code-coverage

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: front/coverage/

  sonar-backend:
    runs-on: ubuntu-latest
    needs: [ backend-tests ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run SonarCloud backend analysis
        working-directory: back
        run: |
          mvn -B verify sonar:sonar \
            -Dsonar.projectKey=mel-a-lab_ocr_p10 \
            -Dsonar.organization=mel-a-lab \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

  sonar-front:
    runs-on: ubuntu-latest
    needs: [ frontend-tests ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run SonarCloud frontend analysis
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          projectBaseDir: front
          args: >
            -Dsonar.projectKey=mel-a-lab_ocr_p10_front
            -Dsonar.organization=mel-a-lab
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_FRONT }}

  docker-build-check:
    runs-on: ubuntu-latest
    needs: [ backend-tests, frontend-tests, sonar-backend, sonar-front ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t bobapp-back:test ./back

      - name: Build frontend Docker image
        run: docker build -t bobapp-front:test ./front
